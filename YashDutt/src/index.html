<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharma Pulse - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Left Side - Brand & Info -->
        <div class="left-section">
            <div class="brand-content">
                <div class="logo-wrapper">
                    <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M50 20 L50 80 M30 50 L70 50" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                        <circle cx="50" cy="50" r="8" fill="currentColor"/>
                    </svg>
                </div>
                <h1 class="brand-title">Pharma Pulse</h1>
                <p class="brand-subtitle">Your trusted healthcare companion</p>
            </div>
            
            <div class="features">
                <div class="feature-item">
                    <span class="feature-icon">✓</span>
                    <span>Quick & Secure Access</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">✓</span>
                    <span>Manage Your Medications</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">✓</span>
                    <span>Track Your Health</span>
                </div>
            </div>

            <div class="wave">
                <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
                    <path d="M0,50 Q300,0 600,50 T1200,50 L1200,120 L0,120 Z" fill="rgba(255,255,255,0.1)"/>
                </svg>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="right-section">
            <div class="form-container">
                <div class="form-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to your account</p>
                </div>

                <form id="loginForm" class="login-form">
                    <!-- Name Field -->
                    <div class="form-group">
                        <label for="name" class="form-label">Full Name</label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="name" 
                                name="name" 
                                placeholder="Enter your full name"
                                required
                                class="form-input"
                            >
                            <span class="input-icon">👤</span>
                        </div>
                        <span class="error-message" id="nameError"></span>
                    </div>

                    <!-- Phone Number Field -->
                    <div class="form-group">
                        <label for="phone" class="form-label">Phone Number</label>
                        <div class="input-wrapper">
                            <div class="country-code">+91</div>
                            <input 
                                type="tel" 
                                id="phone" 
                                name="phone" 
                                placeholder="Enter your 10-digit number"
                                maxlength="10"
                                required
                                class="form-input phone-input"
                                pattern="[0-9]{10}"
                            >
                            <span class="input-icon">📱</span>
                        </div>
                        <span class="error-message" id="phoneError"></span>
                    </div>

                    <!-- Form Actions -->
                    <div class="form-actions">
                        <button type="submit" class="btn btn-login">
                            <span class="btn-text">Login</span>
                            <span class="btn-icon">→</span>
                        </button>
                        <a href="#" class="btn btn-signup">
                            <span class="btn-text">Create Account</span>
                        </a>
                    </div>
                </form>

                <!-- Additional Links -->
                <div class="form-footer">
                    <a href="#" class="footer-link">Forgot your details?</a>
                    <span class="divider">•</span>
                    <a href="#" class="footer-link">Need help?</a>
                </div>

                <!-- Terms -->
                <p class="terms-text">
                    By logging in, you agree to our 
                    <a href="#" class="terms-link">Terms of Service</a> and 
                    <a href="#" class="terms-link">Privacy Policy</a>
                </p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
